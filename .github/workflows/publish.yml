name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish to the MCP Registry (e.g. 1.0.2). The package must already exist on PyPI — this skips the PyPI publish and only runs the registry step."
        required: true

jobs:
  build:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Run tests
        run: |
          uv sync
          uv run pytest

      - name: Build sdist and wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/excel-vision-mcp
    permissions:
      # Required for PyPI Trusted Publishing (OIDC) — no API token needed
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-registry:
    # Runs after a successful PyPI publish on release, or standalone via
    # workflow_dispatch when the version is already on PyPI
    if: always() && (github.event_name == 'workflow_dispatch' || needs.publish.result == 'success')
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      # OIDC proves this workflow runs in the VOYAGER-Inc org, which grants
      # the io.github.voyager-inc/* namespace on the MCP Registry
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        # Release assets use "amd64", while uname -m reports "x86_64" — hardcode
        # the pair matching ubuntu-latest runners
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Sync server.json version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.json.tmp
          mv server.json.tmp server.json
          echo "Publishing registry version: $VERSION"

      - name: Login to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
